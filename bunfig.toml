[test]
# IMPORTANT: Do not run `bun test` from the root — it discovers all test files
# across packages and runs them in a single process, which causes cross-package
# interference (e.g., resize.test.ts mocks the ink module globally).
#
# Use `bun run test` instead, which runs each package's tests independently.
preload = ["./packages/ink-ui/test/preload.ts"]

[test.env]
FORCE_COLOR = "3"
